<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>崩坏：星穹铁道 · 星琼计算器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS Variables & Reset
   ============================================================ */
:root {
  --bg-primary: #0a0a1a;
  --bg-card: rgba(20, 20, 50, 0.7);
  --bg-card-hover: rgba(30, 30, 70, 0.8);
  --text-primary: #e8e8f0;
  --text-secondary: #9898b8;
  --text-dim: #6868a0;
  --gold: #d4a843;
  --gold-light: #f0d080;
  --gold-glow: rgba(212, 168, 67, 0.3);
  --blue: #4a8fd8;
  --blue-light: #6ab0f0;
  --blue-glow: rgba(74, 143, 216, 0.25);
  --purple: #9b6bdc;
  --pink: #e060a0;
  --green: #50b080;
  --orange: #e09040;
  --cyan: #40b8c0;
  --red: #d05050;
  --border-color: rgba(255,255,255,0.08);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.25s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans SC', -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

/* ============================================================
   Starry Space Background
   ============================================================ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(30,20,80,0.6) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(60,20,60,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(20,40,80,0.3) 0%, transparent 50%);
  pointer-events: none;
}
/* Stars via box-shadow technique (small dots) */
#stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* ============================================================
   Layout
   ============================================================ */
.app-container {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 20px 40px;
}

/* Header */
.app-header {
  text-align: center;
  padding: 24px 0 16px;
  margin-bottom: 20px;
}
.app-header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.app-header .subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ============================================================
   Cards (Glassmorphism)
   ============================================================ */
.card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 20px;
  transition: background var(--transition);
}
.card:hover { background: var(--bg-card-hover); }

/* ============================================================
   Year Navigation
   ============================================================ */
.year-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}
.year-nav button {
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-size: 1.2rem;
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; justify-content: center;
}
.year-nav button:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--gold);
  color: var(--gold);
}
.year-nav .year-label {
  font-size: 1.4rem;
  font-weight: 600;
  min-width: 80px;
  text-align: center;
}
.year-nav .btn-today {
  font-size: 0.85rem;
  border-radius: 20px;
  width: auto;
  padding: 0 16px;
  border-color: var(--gold);
  color: var(--gold);
  font-weight: 500;
}
.year-nav .btn-today:hover {
  background: var(--gold-glow);
}

/* ============================================================
   Calendar Grid
   ============================================================ */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
@media (max-width: 1100px) { .calendar-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 820px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
@media (max-width: 540px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } }

/* Month Card */
.month-card {
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-color);
  transition: all var(--transition);
}
.month-card:hover {
  background: var(--bg-card-hover);
}
/* Current month highlight */
.month-card.current-month {
  border-color: var(--gold);
  border-width: 2px;
  box-shadow: 0 0 20px var(--gold-glow), 0 0 40px var(--gold-glow);
}

.month-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 6px;
  font-weight: 600;
  font-size: 0.95rem;
}
.month-header .month-name { color: var(--text-primary); }
.month-header .version-tag {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  white-space: nowrap;
}

/* Weekday headers */
.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 2px 4px 0;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: center;
  font-weight: 500;
}

/* Days grid */
.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 2px 4px 8px;
  gap: 1px;
}

/* Day cell */
.day-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.78rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  user-select: none;
  width: 100%;
  max-width: 36px;
  margin: 0 auto;
}
.day-cell:hover:not(.past):not(.empty) {
  background: rgba(255,255,255,0.12);
}
.day-cell.empty { cursor: default; }

/* Past dates */
.day-cell.past {
  opacity: 0.35;
  cursor: not-allowed;
}

/* Today */
.day-cell.today {
  border: 2px solid var(--gold);
  font-weight: 700;
  color: var(--gold-light);
}

/* Selected date */
.day-cell.selected {
  background: var(--blue);
  color: #fff;
  font-weight: 600;
}
.day-cell.selected:hover {
  background: var(--blue-light);
}

/* Range highlight (future dates in a selected range) */
.day-cell.in-range {
  background: var(--blue-glow);
  position: relative;
}
.day-cell.in-range.range-start {
  background: linear-gradient(135deg, var(--blue), var(--blue-glow));
  color: #fff;
  font-weight: 600;
}
.day-cell.in-range.range-end {
  background: linear-gradient(225deg, var(--blue), var(--blue-glow));
  color: #fff;
  font-weight: 600;
}
.day-cell.in-range.range-single {
  background: var(--blue);
  color: #fff;
  font-weight: 600;
}

/* Event markers bar at bottom of date cell */
.event-bar {
  position: absolute;
  bottom: 1px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 2px;
  height: 6px;
  pointer-events: none;
}
.event-marker {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: all var(--transition);
}
/* Version update — prominent glowing badge */
.event-marker.version-update {
  width: 16px;
  height: 5px;
  border-radius: 3px;
  box-shadow: 0 0 6px var(--cyan), 0 0 14px var(--cyan);
  animation: pulse-update 2s ease-in-out infinite;
}
@keyframes pulse-update {
  0%, 100% { box-shadow: 0 0 6px var(--cyan), 0 0 14px var(--cyan); }
  50% { box-shadow: 0 0 10px var(--cyan), 0 0 22px var(--cyan); }
}

/* ============================================================
   Tooltip
   ============================================================ */
.event-tooltip {
  position: fixed;
  z-index: 100;
  background: rgba(10, 10, 30, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--gold);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 0.8rem;
  line-height: 1.6;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  max-width: 260px;
  display: none;
}
.event-tooltip.visible { display: block; }
.event-tooltip .tt-date { color: var(--gold-light); font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
.event-tooltip .tt-item { display: flex; justify-content: space-between; gap: 10px; }
.event-tooltip .tt-item .tt-name { color: var(--text-secondary); }
.event-tooltip .tt-item .tt-value { color: var(--text-primary); font-weight: 500; }

/* ============================================================
   Legend
   ============================================================ */
.legend-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  padding: 10px 16px;
  margin-bottom: 20px;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.78rem;
  color: var(--text-secondary);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-dot.today-dot {
  border: 2px solid var(--gold);
  background: transparent;
}

/* ============================================================
   Main Layout
   ============================================================ */
.main-layout {
  display: flex;
  flex-direction: column;
  margin-bottom: 20px;
}

/* ============================================================
   Controls Panel — horizontal card row
   ============================================================ */
.controls-panel {
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  gap: 14px;
}
.controls-panel > .card {
  flex: 1;
  min-width: 180px;
}
@media (max-width: 600px) {
  .controls-panel { flex-direction: column; }
  .controls-panel > .card { min-width: 0; }
}

.panel-section { margin-bottom: 4px; }
.panel-section-title {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-color);
}

/* Resource Inputs */
.resource-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.resource-input-group label {
  display: block;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 2px;
}
.resource-input-group input {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 6px 8px;
  color: var(--text-primary);
  font-size: 0.9rem;
  font-weight: 600;
  outline: none;
  transition: border-color var(--transition);
}
.resource-input-group input:focus {
  border-color: var(--gold);
}
.resource-input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }

/* Toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}
.toggle-row label {
  font-size: 0.82rem;
  color: var(--text-secondary);
}
.toggle-switch {
  position: relative;
  width: 40px; height: 22px;
  background: rgba(255,255,255,0.1);
  border-radius: 11px;
  cursor: pointer;
  transition: background var(--transition);
}
.toggle-switch.active { background: var(--gold); }
.toggle-switch::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: transform var(--transition);
}
.toggle-switch.active::after { transform: translateX(18px); }

/* Selected Ranges */
.range-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 180px;
  overflow-y: auto;
}
.range-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.8rem;
}
.range-item .range-label {
  color: var(--text-primary);
}
.range-item .range-days {
  color: var(--text-dim);
  font-size: 0.72rem;
}
.range-item .range-del {
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  font-size: 1rem;
  padding: 0 4px;
  line-height: 1;
}
.range-item .range-del:hover { color: #ff7070; }
.range-empty {
  color: var(--text-dim);
  font-size: 0.8rem;
  text-align: center;
  padding: 12px 0;
}

/* Goal Section */
.goal-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 4px;
}
.goal-row input {
  width: 80px;
  flex: none;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text-primary);
  font-size: 0.9rem;
  outline: none;
  font-weight: 500;
}
.goal-row input:focus { border-color: var(--gold); }
.goal-row select {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 6px 8px;
  color: var(--text-primary);
  font-size: 0.8rem;
  outline: none;
}
.btn-goal {
  background: linear-gradient(135deg, var(--gold), var(--orange));
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  color: #fff;
  font-weight: 600;
  font-size: 0.82rem;
  cursor: pointer;
  transition: opacity var(--transition);
  white-space: nowrap;
}
.btn-goal:hover { opacity: 0.85; }

.goal-result {
  margin-top: 8px;
  padding: 10px 12px;
  background: rgba(212,168,67,0.08);
  border: 1px solid var(--gold-glow);
  border-radius: 6px;
  font-size: 0.82rem;
  line-height: 1.7;
  display: none;
}
.goal-result.visible { display: block; }
.goal-result .gr-date { color: var(--gold-light); font-weight: 600; }
.goal-result .gr-value { color: var(--text-primary); font-weight: 600; }

/* ============================================================
   Results Panel — full-width horizontal
   ============================================================ */
.results-panel {
  margin-top: 20px;
}
.results-body {
  display: flex;
  flex-direction: row;
  gap: 20px;
  align-items: stretch;
}
.results-totals {
  flex: 0 0 auto;
  min-width: 340px;
}
.results-breakdown {
  flex: 1;
  min-width: 0;
  overflow-x: auto;
}
@media (max-width: 900px) {
  .results-body { flex-direction: column; }
  .results-totals { min-width: 0; }
}

.results-total {
  display: flex;
  flex-direction: row;
  gap: 10px;
}
.total-card {
  flex: 1;
  text-align: center;
  padding: 12px 8px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
}
.total-card.gold-border {
  border-color: var(--gold);
  border-width: 2px;
  background: linear-gradient(135deg, rgba(212,168,67,0.06), rgba(212,168,67,0.02));
}
.total-card .total-label {
  font-size: 0.72rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.total-card .total-value {
  font-size: 1.3rem;
  font-weight: 700;
  margin-top: 2px;
}
.total-card .total-value.jade { color: var(--blue-light); }
.total-card .total-value.special { color: var(--gold-light); }
.total-card .total-value.regular { color: var(--purple); }
.total-card .total-sub {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Breakdown Table */
.breakdown-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
.breakdown-table th {
  text-align: left;
  padding: 6px 8px;
  color: var(--text-dim);
  font-weight: 500;
  border-bottom: 1px solid var(--border-color);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.breakdown-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.breakdown-table tr:last-child td { border-bottom: none; }
.breakdown-table .bd-name {
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.breakdown-table .bd-color {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.breakdown-table .bd-value {
  text-align: right;
  font-weight: 500;
}
.breakdown-table .bd-sub {
  text-align: right;
  font-size: 0.72rem;
  color: var(--text-dim);
}
.breakdown-table .bd-empty {
  text-align: center;
  color: var(--text-dim);
  padding: 20px 0;
  font-size: 0.85rem;
}

/* Save flash */
.save-flash {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: rgba(80, 176, 128, 0.9);
  backdrop-filter: blur(8px);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 200;
}
.save-flash.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ============================================================
   Scrollbar
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ============================================================
   Utility
   ============================================================ */
.text-gold { color: var(--gold); }
.text-blue { color: var(--blue-light); }
.text-purple { color: var(--purple); }
.text-green { color: var(--green); }
.text-pink { color: var(--pink); }
.text-orange { color: var(--orange); }
.text-cyan { color: var(--cyan); }
</style>
</head>
<body>

<!-- ===== Stars Container ===== -->
<div id="stars"></div>

<!-- ===== Tooltip ===== -->
<div class="event-tooltip" id="eventTooltip"></div>

<!-- ===== Save Flash ===== -->
<div class="save-flash" id="saveFlash">✓ 已自动保存</div>

<div class="app-container">
  <!-- Header -->
  <header class="app-header">
    <h1>崩坏：星穹铁道<br><span style="font-size:1.2rem;">星琼计算器</span></h1>
  </header>

  <!-- Year Navigation -->
  <nav class="year-nav">
    <button id="btnPrevYear" title="上一年">◀</button>
    <span class="year-label" id="yearLabel">2026</span>
    <button id="btnNextYear" title="下一年">▶</button>
    <button class="btn-today" id="btnToday">今天</button>
  </nav>

  <!-- Calendar Grid -->
  <div class="calendar-grid" id="calendarGrid"></div>

  <!-- Legend -->
  <div class="card legend-bar" id="legendBar"></div>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Controls: horizontal card row -->
    <div class="controls-panel">
      <!-- Account Tabs -->
      <div class="card" style="flex: 0 0 100%;min-width:0;padding:8px 12px;">
        <div class="account-tabs" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <div id="accountTabList" style="display:flex;gap:4px;flex:1;flex-wrap:wrap;"></div>
          <button id="btnAddAccount" style="background:rgba(255,255,255,0.08);border:1px solid var(--border-color);border-radius:6px;color:var(--text-secondary);cursor:pointer;padding:4px 10px;font-size:0.8rem;white-space:nowrap;">+ 添加账号</button>
        </div>
      </div>
      <!-- Story Event Rewards (hidden until range selected) -->
      <div class="card" id="storyRewardPanel" style="display:none;">
        <div class="panel-section">
          <div class="panel-section-title">剧情活动奖励</div>
          <div id="storyRewardList"></div>
        </div>
      </div>

      <!-- Resources -->
      <div class="card">
        <div class="panel-section">
          <div class="panel-section-title">当前持有</div>
          <div class="resource-inputs">
            <div class="resource-input-group">
              <label>🌟 星琼</label>
              <input type="number" id="inputJade" min="0" value="0" placeholder="0">
            </div>
            <div class="resource-input-group">
              <label>🎫 专票</label>
              <input type="number" id="inputSpecial" min="0" value="0" placeholder="0">
            </div>
            <div class="resource-input-group">
              <label>🎟 通票</label>
              <input type="number" id="inputRegular" min="0" value="0" placeholder="0">
            </div>
          </div>
        </div>
      </div>

      <!-- Monthly Card Toggle -->
      <div class="card">
        <div class="panel-section">

<script>
/* ============================================================
   Starfield Generation
   ============================================================ */
(function generateStars() {
  const container = document.getElementById('stars');
  const count = 200;
  let css = '';
  for (let i = 0; i < count; i++) {
    const x = Math.random() * 100;
    const y = Math.random() * 100;

  }
  container.style.boxShadow = css;
  container.style.width = '0';
  container.style.height = '0';
})();

/* ============================================================
   Constants & Configuration
   ============================================================ */
const DAY_MS = 86400000;
const VERSION_DAYS = 42;

const VERSION_ANCHOR = { major: 4, minor: 4, date: new Date(2026, 6, 15) }; // v4.4 = 2026-07-15

// Major version max minor versions
const VERSION_CAPS = { 0: 0, 1: 6, 2: 7, 3: 8, 4: 8 }; // 5.x+ unlimited

// Version colors by major version
const VERSION_COLORS = {
  0: { bg: 'rgba(120,120,120,0.2)', text: '#a0a0a0', name: 'gray' },
  1: { bg: 'rgba(220,140,60,0.2)', text: '#e09040', name: 'orange' },
  2: { bg: 'rgba(155,107,220,0.2)', text: '#9b6bdc', name: 'purple' },
  3: { bg: 'rgba(74,143,216,0.2)', text: '#4a8fd8', name: 'blue' },
  4: { bg: 'rgba(64,184,192,0.2)', text: '#40b8c0', name: 'cyan' },
};
const VERSION_COLOR_DEFAULT = { bg: 'rgba(80,176,128,0.2)', text: '#50b080', name: 'green' };

// Event colors for legend/breakdown
const EVENT_COLORS = {
  daily: '#4a8fd8',       // blue
  monthlyCard: '#f0d080', // gold
  simulatedUniverse: '#9b6bdc', // purple
  chaosMemory: '#e060a0', // pink
  shopExchange: '#50b080', // green
  livePreview: '#e09040', // orange
  versionUpdate: '#40b8c0', // cyan
};

const EVENT_NAMES = {
  daily: '每日活跃',
  monthlyCard: '月卡奖励',
  simulatedUniverse: '模拟宇宙',
  chaosMemory: '混沌回忆',
  shopExchange: '商城兑换',
  livePreview: '前瞻获取',
  versionUpdate: '版本更新',
};

/* ============================================================
   Date Utilities
   ============================================================ */
function dateKey(d) {
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function daysBetween(a, b) {
  return Math.round((b - a) / DAY_MS);
}
function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function isPast(d) {
  const today = startOfDay(new Date());
  return d < today;
}
function isToday(d) {
  return isSameDay(d, new Date());
}
function getMonthDays(year, month) {
  return new Date(year, month + 1, 0).getDate();
}
function getFirstDayOfMonth(year, month) {
  return new Date(year, month, 1).getDay(); // 0=Sun
}

/* ============================================================
   Version System
   ============================================================ */
function getVersion(date) {
  // Calculate days from anchor
  const anchor = VERSION_ANCHOR.date;
  const diffDays = Math.round((date - anchor) / DAY_MS);
  const versionOffset = Math.floor(diffDays / VERSION_DAYS);

  let major = VERSION_ANCHOR.major;
  let minor = VERSION_ANCHOR.minor;

  if (versionOffset > 0) {
    // Forward
    for (let i = 0; i < versionOffset; i++) {
      minor++;
      if (major >= 5) {
        // 5.x+ unlimited
        continue;
      }
      const cap = VERSION_CAPS[major];
      if (minor > cap) {
        minor = 0;
        major++;
      }
    }
  } else if (versionOffset < 0) {
    // Backward
    for (let i = 0; i < -versionOffset; i++) {
      minor--;
      if (minor < 0) {
        major--;
        if (major < 0) return null; // before v0
        const cap = VERSION_CAPS[major] !== undefined ? VERSION_CAPS[major] : 0;
        minor = cap;
      }
    }
  }

  return { major, minor };
}

function getVersionLabel(ver) {
  if (!ver) return '';
  return `v${ver.major}.${ver.minor}`;
}

function getVersionColor(ver) {
  if (!ver) return VERSION_COLOR_DEFAULT;
  const c = VERSION_COLORS[ver.major];
  return c || VERSION_COLOR_DEFAULT;
}

/* ============================================================
   Revenue Rules
   ============================================================ */
const RULES = [];

// 1. Daily Active
RULES.push({
  id: 'daily',
  name: '每日活跃',
  color: EVENT_COLORS.daily,
  check(date) { return true; }, // every day
  getReward(date, opts) {
    return { stellarJade: 60, specialPass: 0, regularPass: 0 };
  }
});

// 2. Monthly Card
RULES.push({
  id: 'monthlyCard',
  name: '月卡奖励',
  color: EVENT_COLORS.monthlyCard,
  check(date, opts) {
      if (!opts?.monthlyCardEnabled) return false;
      const days = opts?.remainingCardDays || 0;
      if (days > 0) {
        const today = startOfDay(new Date());
        const diff = Math.round((date - today) / 86400000);
        return diff >= 0 && diff < days;
      }
      return true;
    },
  getReward(date, opts) {
    return { stellarJade: 90, specialPass: 0, regularPass: 0 };
  }
});

// 3. Simulated Universe (every Monday)
RULES.push({
  id: 'simulatedUniverse',
  name: '模拟宇宙',
  color: EVENT_COLORS.simulatedUniverse,
  check(date) {
    return date.getDay() === 1; // Monday
  },
  getReward(date, opts) {
    return { stellarJade: 225, specialPass: 0, regularPass: 1 };
  }
});

// 4. Chaos Memory (every other Monday, anchor 2026-06-22)
const CHAOS_ANCHOR = new Date(2026, 5, 22); // 2026-06-22
RULES.push({
  id: 'chaosMemory',
  name: '混沌回忆',
  color: EVENT_COLORS.chaosMemory,
  check(date) {
    if (date.getDay() !== 1) return false;
    const diff = Math.round((date - CHAOS_ANCHOR) / DAY_MS);
    return diff >= 0 && diff % 14 === 0;
  },
  getReward(date, opts) {
    return { stellarJade: 900, specialPass: 0, regularPass: 0 };
  }
});

// 5. Shop Exchange (1st of every month)
RULES.push({
  id: 'shopExchange',
  name: '商城兑换',
  color: EVENT_COLORS.shopExchange,
  check(date) {
    return date.getDate() === 1;
  },
  getReward(date, opts) {
    return { stellarJade: 0, specialPass: 5, regularPass: 5 };
  }
});

// 6. Live Preview (every 6 weeks Friday, anchor 2026-07-03)
const LIVE_ANCHOR = new Date(2026, 6, 3); // 2026-07-03
RULES.push({
  id: 'livePreview',
  name: '前瞻获取',
  color: EVENT_COLORS.livePreview,
  check(date) {
    if (date.getDay() !== 5) return false; // Friday
    const diff = Math.round((date - LIVE_ANCHOR) / DAY_MS);
    return diff >= 0 && diff % 42 === 0;
  },
  getReward(date, opts) {
    return { stellarJade: 300, specialPass: 0, regularPass: 0 };
  }
});

// 7. Version Update (every 6 weeks Wednesday, anchor 2026-07-15)
const UPDATE_ANCHOR = new Date(2026, 6, 15); // 2026-07-15
RULES.push({
  id: 'versionUpdate',
  name: '版本更新',
  color: EVENT_COLORS.versionUpdate,
  check(date) {
    if (date.getDay() !== 3) return false; // Wednesday
    const diff = Math.round((date - UPDATE_ANCHOR) / DAY_MS);
    return diff >= 0 && diff % 42 === 0;
  },
  getReward(date, opts) {
    return { stellarJade: 600, specialPass: 0, regularPass: 0 };
  }
});

// Get events on a specific date
function getEventsForDate(date, opts) {
  const events = [];
  for (const rule of RULES) {
    if (rule.check(date, opts)) {
      events.push(rule);
    }
  }
  return events;
}

/* ============================================================
   Calculation Engine
   ============================================================ */
function calculateRange(start, end, opts) {
  // start and end are inclusive
  const result = {};
  for (const rule of RULES) {
    result[rule.id] = { stellarJade: 0, specialPass: 0, regularPass: 0, name: rule.name, color: rule.color };
  }
  result._total = { stellarJade: 0, specialPass: 0, regularPass: 0 };

  let cur = new Date(start);
  while (cur <= end) {
    for (const rule of RULES) {
      if (rule.check(cur, opts)) {
        const reward = rule.getReward(cur, opts);
        result[rule.id].stellarJade += reward.stellarJade;
        result[rule.id].specialPass += reward.specialPass;
        result[rule.id].regularPass += reward.regularPass;
        result._total.stellarJade += reward.stellarJade;
        result._total.specialPass += reward.specialPass;
        result._total.regularPass += reward.regularPass;
      }
    }
    cur = addDays(cur, 1);
  }

  return result;
}

// Goal-oriented: find the date when target is reached
function calculateGoal(targetJade, opts) {
  const today = startOfDay(new Date());
  const start = new Date(today);

  let cumulative = 0;
  let specialPassTotal = 0;
  let cur = new Date(start);
  const maxDays = 730; // 2 years max
  const dailyBreakdown = [];

  // Find future unstarted versions for story rewards
  const futureVersions = [];
  {
    const farEnd = addDays(today, maxDays);
    const firstVer = getVersion(today);
    if (firstVer) {
      let vStart = getVersionStartDate(firstVer);
      let vLabel = getVersionLabel(firstVer);
      while (vStart <= farEnd) {
        if (vStart > today && !futureVersions.some(v => v.label === vLabel)) {
          futureVersions.push({ label: vLabel, startDate: vStart });
        }
        vStart = addDays(vStart, VERSION_DAYS);
        vLabel = getVersionLabel(getVersion(vStart));
      }
    }
  }

  for (let i = 0; i < maxDays; i++) {
    let dayTotal = 0;
    // Add one-time story rewards for future versions
    for (const fv of futureVersions) {
      if (isSameDay(cur, fv.startDate)) {
        dayTotal += 4000 + 10 * 160;
        specialPassTotal += 10;
      }
    }
    for (const rule of RULES) {
      if (rule.check(cur, opts)) {
        const reward = rule.getReward(cur, opts);
        dayTotal += reward.stellarJade + reward.specialPass * 160;
        specialPassTotal += reward.specialPass;
      }
    }
    cumulative += dayTotal;
    dailyBreakdown.push({ date: new Date(cur), jade: dayTotal, cumulative });

    if (cumulative >= targetJade) {
      return {
        reached: true,
        date: cur,
        daysNeeded: i + 1,
        totalJade: cumulative,
        specialPassTotal,
        breakdown: dailyBreakdown
      };
    }
    cur = addDays(cur, 1);
  }

  return {
    reached: false,
    date: null,
    daysNeeded: maxDays,
    totalJade: cumulative,
    specialPassTotal,
    breakdown: dailyBreakdown
  };
}

/* ============================================================
   Date Selection Manager — single date, range from today
   ============================================================ */
class RangeManager {
  constructor() {
    this.selectedDate = null;   // end date
    this.startDate = null;      // custom start (only used when !fixedToday)
    this.pendingStart = null;   // first click when !fixedToday
    this.fixedToday = true;
  }

  setFixedToday(v) {
    this.fixedToday = v;
    if (v) {
      // Switching to fixed today: drop custom start, keep end
      this.startDate = null;
      this.pendingStart = null;
    } else {
      // Switching to custom: drop selected if no start
      this.startDate = null;
      this.pendingStart = null;
    }
  }

  select(date) {
    const d = startOfDay(new Date(date));
    if (this.fixedToday) {
      // Fixed: single click sets end date
      this.selectedDate = d;
    } else {
      // Custom: two clicks — first sets start, second sets end
      if (this.pendingStart === null) {
        // No pending start: set this as start
        this.pendingStart = d;
        this.startDate = null;
        this.selectedDate = null;
      } else {
        // Has pending start: complete the range
        const s = this.pendingStart;
        if (isSameDay(s, d)) {
          // Click same date again = cancel
          this.pendingStart = null;
          return;
        }
        this.startDate = s < d ? s : d;
        this.selectedDate = s < d ? d : s;
        this.pendingStart = null;
      }
    }
  }

  clear() {
    this.selectedDate = null;
    this.startDate = null;
    this.pendingStart = null;
  }

  isSelected(date) {
    const d = startOfDay(new Date(date));
    if (this.pendingStart && isSameDay(d, this.pendingStart)) return true;
    if (this.selectedDate && isSameDay(d, this.selectedDate)) return true;
    if (!this.fixedToday && this.startDate && isSameDay(d, this.startDate)) return true;
    return false;
  }

  hasSelection() {
    return this.selectedDate !== null;
  }

  getEndDate() {
    return this.selectedDate;
  }

  getStartDate() {
    if (this.fixedToday || !this.startDate) {
      return startOfDay(new Date()); // today
    }
    return this.startDate;
  }

  // Is this date within the range?
  isInRange(date) {
    if (!this.selectedDate) return false;
    const ts = date.getTime();
    const start = this.getStartDate().getTime();
    const end = this.selectedDate.getTime();
    return ts >= start && ts <= end;
  }

  // Get range-edge info for rendering
  getRangeInfo(date) {
    if (!this.selectedDate) return null;
    const ts = date.getTime();
    const s = this.getStartDate().getTime();
    const e = this.selectedDate.getTime();
    if (ts < s || ts > e) return null;
    const isSingle = s === e;
    return { isStart: ts === s, isEnd: ts === e, isSingle };
  }

  isPendingStart(date) {
    return this.pendingStart !== null && isSameDay(date, this.pendingStart);
  }

  getTotalDays() {
    if (!this.selectedDate) return 0;
    return daysBetween(this.getStartDate(), this.selectedDate) + 1;
  }
}

/* ============================================================
   Resource Manager (localStorage)
   ============================================================ */
const STORAGE_KEY = 'hsr_resources';

class ResourceManager {
  constructor() {
    this.holdings = { stellarJade: 0, specialPass: 0, regularPass: 0 };
    this.monthlyCardEnabled = true;
    this.remainingCardDays = 0;
    this.load();
  }

  load() {
    try {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (data) {
        this.holdings.stellarJade = data.sj || 0;
        this.holdings.specialPass = data.sp || 0;
        this.holdings.regularPass = data.rp || 0;
        if (data.mc !== undefined) this.monthlyCardEnabled = data.mc;
        if (data.rcd !== undefined) this.remainingCardDays = data.rcd;
      }
    } catch (e) { /* ignore */ }
  }

  save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      sj: this.holdings.stellarJade,
      sp: this.holdings.specialPass,
      rp: this.holdings.regularPass,
      mc: this.monthlyCardEnabled,
      rcd: this.remainingCardDays
    }));
    // Flash notification
    const el = document.getElementById('saveFlash');
    el.classList.add('visible');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('visible'), 1500);
  }

  setJade(v) { this.holdings.stellarJade = Math.max(0, Math.floor(v)); this.save(); }
  setSpecial(v) { this.holdings.specialPass = Math.max(0, Math.floor(v)); this.save(); }
  setRegular(v) { this.holdings.regularPass = Math.max(0, Math.floor(v)); this.save(); }
  setMonthlyCard(v) { this.monthlyCardEnabled = v; this.save(); }
  setRemainingDays(v) { this.remainingCardDays = Math.max(0, Math.floor(v)); this.save(); }
}

/* ============================================================
   Account Manager — multi-account support
   ============================================================ */
const ACCOUNTS_KEY = 'hsr_accounts';

class AccountManager {
  constructor(resourceManager, rangeManager) {
    this.rm = resourceManager;
    this.rgm = rangeManager;
    this.accounts = []; // [{ id, name, resources, range }]
    this.activeId = null;
    this.load();
  }

  load() {
    try {
      const data = JSON.parse(localStorage.getItem(ACCOUNTS_KEY));
      if (data && data.accounts && data.accounts.length > 0) {
        this.accounts = data.accounts;
        this.activeId = data.activeId || this.accounts[0].id;
        this.applyActive();
        return;
      }
    } catch (e) { /* ignore */ }

    // First launch: migrate existing single-account data into one account
    const legacy = JSON.parse(localStorage.getItem(STORAGE_KEY));
    const defaultResources = { sj: 0, sp: 0, rp: 0, mc: true, rcd: 0 };
    const res = legacy || defaultResources;
    const id = this.generateId();
    this.accounts = [{
      id,
      name: '账号 1',
      resources: { sj: res.sj || 0, sp: res.sp || 0, rp: res.rp || 0, mc: res.mc !== false, rcd: res.rcd || 0 },
      range: { selectedDate: null, startDate: null, pendingStart: null, fixedToday: true }
    }];
    this.activeId = id;
    this.applyActive();
    this.save();
  }

  generateId() {
    return 'acc_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  }

  applyActive() {
    const acc = this.accounts.find(a => a.id === this.activeId);
    if (!acc) return;
    const r = acc.resources;
    this.rm.holdings.stellarJade = r.sj;
    this.rm.holdings.specialPass = r.sp;
    this.rm.holdings.regularPass = r.rp;
    this.rm.monthlyCardEnabled = r.mc;
    this.rm.remainingCardDays = r.rcd;
    if (acc.range) {
      this.rgm.selectedDate = acc.range.selectedDate ? new Date(acc.range.selectedDate) : null;
      this.rgm.startDate = acc.range.startDate ? new Date(acc.range.startDate) : null;
      this.rgm.pendingStart = acc.range.pendingStart ? new Date(acc.range.pendingStart) : null;
      this.rgm.fixedToday = acc.range.fixedToday !== false;
    }
  }

  snapshotActive() {
    const acc = this.accounts.find(a => a.id === this.activeId);
    if (!acc) return;
    acc.resources = {
      sj: this.rm.holdings.stellarJade,
      sp: this.rm.holdings.specialPass,
      rp: this.rm.holdings.regularPass,
      mc: this.rm.monthlyCardEnabled,
      rcd: this.rm.remainingCardDays
    };
    acc.range = {
      selectedDate: this.rgm.selectedDate ? this.rgm.selectedDate.getTime() : null,
      startDate: this.rgm.startDate ? this.rgm.startDate.getTime() : null,
      pendingStart: this.rgm.pendingStart ? this.rgm.pendingStart.getTime() : null,
      fixedToday: this.rgm.fixedToday
    };
  }

  save() {
    localStorage.setItem(ACCOUNTS_KEY, JSON.stringify({
      accounts: this.accounts,
      activeId: this.activeId
    }));
  }

  addAccount(name) {
    const id = this.generateId();
    this.accounts.push({
      id,
      name: name || `账号 ${this.accounts.length + 1}`,
      resources: { sj: 0, sp: 0, rp: 0, mc: true, rcd: 0 },
      range: { selectedDate: null, startDate: null, pendingStart: null, fixedToday: true }
    });
    this.save();
    return id;
  }

  removeAccount(id) {
    if (this.accounts.length <= 1) return false; // keep at least one
    const idx = this.accounts.findIndex(a => a.id === id);
    if (idx === -1) return false;
    this.accounts.splice(idx, 1);
    if (this.activeId === id) {
      this.activeId = this.accounts[0].id;
      this.applyActive();
    }
    this.save();
    return true;
  }

  switchAccount(id) {
    if (id === this.activeId) return;
    this.snapshotActive();
    this.activeId = id;
    this.applyActive();
    this.save();
  }

  getActive() {
    return this.accounts.find(a => a.id === this.activeId);
  }

  getActiveName() {
    const acc = this.getActive();
    return acc ? acc.name : '';
  }

  autoSave() {
    // Hook into ResourceManager save — intercept and save at account level
    this.snapshotActive();
    this.save();
  }
}

/* ============================================================
   Calendar Renderer
   ============================================================ */
const MONTH_NAMES = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const WEEKDAY_NAMES = ['日','一','二','三','四','五','六'];

class Calendar {
  constructor(rangeManager, resourceManager) {
    this.year = new Date().getFullYear();
    this.rangeManager = rangeManager;
    this.resourceManager = resourceManager;
  }

  setYear(y) {
    this.year = y;
    this.render();
  }

  render() {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    document.getElementById('yearLabel').textContent = this.year;

    const today = startOfDay(new Date());
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();

    for (let m = 0; m < 12; m++) {
      const monthCard = document.createElement('div');
      monthCard.className = 'month-card';
      if (this.year === currentYear && m === currentMonth) {
        monthCard.classList.add('current-month');
      }

      // Month header
      const header = document.createElement('div');
      header.className = 'month-header';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'month-name';
      nameSpan.textContent = MONTH_NAMES[m];
      header.appendChild(nameSpan);

      // Version tag
      const midDate = new Date(this.year, m, 15);
      const ver = getVersion(midDate);
      const verColor = getVersionColor(ver);
      const tag = document.createElement('span');
      tag.className = 'version-tag';
      tag.textContent = getVersionLabel(ver);
      tag.style.background = verColor.bg;
      tag.style.color = verColor.text;
      header.appendChild(tag);

      monthCard.appendChild(header);

      // Weekday row
      const wRow = document.createElement('div');
      wRow.className = 'weekday-row';
      for (let w = 0; w < 7; w++) {
        const wd = document.createElement('span');
        wd.textContent = WEEKDAY_NAMES[w];
        wRow.appendChild(wd);
      }
      monthCard.appendChild(wRow);

      // Days grid
      const daysGrid = document.createElement('div');
      daysGrid.className = 'days-grid';

      const daysInMonth = getMonthDays(this.year, m);
      const firstDay = getFirstDayOfMonth(this.year, m);

      // Empty cells before first day
      for (let e = 0; e < firstDay; e++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        daysGrid.appendChild(empty);
      }

      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(this.year, m, d);
        const key = dateKey(date);
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.dataset.date = key;

        // Past check
        if (isPast(date)) {
          cell.classList.add('past');
        }

        // Today check
        if (isToday(date)) {
          cell.classList.add('today');
        }

        // Selected range check
        if (this.rangeManager.isInRange(date)) {
          cell.classList.add('in-range');
          const ri = this.rangeManager.getRangeInfo(date);
          if (ri) {
            if (ri.isSingle) cell.classList.add('range-single');
            else {
              if (ri.isStart) cell.classList.add('range-start');
              if (ri.isEnd) cell.classList.add('range-end');
            }
          }
        }

        // Pending start highlight (custom mode, first click)
        if (this.rangeManager.isPendingStart(date)) {
          cell.classList.add('selected');
        }

        // Event markers — one per reward type
        const opts = { monthlyCardEnabled: this.resourceManager.monthlyCardEnabled, remainingCardDays: this.resourceManager.remainingCardDays };
        const events = getEventsForDate(date, opts);

        // Check if this is a version update date → show version label
        const hasVersionUpdate = events.some(ev => ev.id === 'versionUpdate');
        if (hasVersionUpdate) {
          const ver = getVersion(date);
          const verLabel = getVersionLabel(ver);
          const verColor = getVersionColor(ver);
          cell.innerHTML = `
            <span style="font-size:0.65rem;line-height:1.1;display:block;">${d}</span>
            <span style="font-size:0.55rem;line-height:1.1;display:block;color:${verColor.text};font-weight:600;">${verLabel}</span>
          `;
        } else {
          cell.textContent = d;
        }

        if (events.length > 0) {
          const bar = document.createElement('div');
          bar.className = 'event-bar';
          for (const ev of events) {
            const m = document.createElement('div');
            m.className = 'event-marker';
            if (ev.id === 'versionUpdate') {
              m.classList.add('version-update');
            }
            m.style.background = ev.color;
            bar.appendChild(m);
          }
          cell.appendChild(bar);

          // Hover tooltip
          cell.addEventListener('mouseenter', (e) => {
            if (isPast(date) && !isToday(date)) return;
            showTooltip(e, date, events);
          });
          cell.addEventListener('mousemove', (e) => {
            moveTooltip(e);
          });
          cell.addEventListener('mouseleave', () => {
            hideTooltip();
          });
        }

        // Click handler
        cell.addEventListener('click', () => this.handleDateClick(date));

        daysGrid.appendChild(cell);
      }

      monthCard.appendChild(daysGrid);
      grid.appendChild(monthCard);
    }
  }

  handleDateClick(date) {
    // Past dates (excluding today) do nothing
    if (isPast(date) && !isToday(date)) return;

    const isFixed = this.rangeManager.fixedToday;

    if (isFixed) {
      // Fixed-today mode: today not selectable, future date toggles end
      if (isToday(date)) return;
      if (this.rangeManager.isSelected(date)) {
        this.rangeManager.clear();
      } else {
        this.rangeManager.select(date);
      }
    } else {
      // Custom-start mode: today can be start, future dates for start/end
      if (this.rangeManager.pendingStart === null && this.rangeManager.selectedDate === null) {
        // No range yet: set pending start (today or future)
        this.rangeManager.select(date);
      } else if (this.rangeManager.pendingStart !== null) {
        // Has pending start: check if clicking same date cancels
        if (isSameDay(date, this.rangeManager.pendingStart)) {
          this.rangeManager.clear();
        } else {
          this.rangeManager.select(date); // completes range
        }
      } else {
        // Range exists: clicking selected start/end clears it
        if (this.rangeManager.isSelected(date)) {
          this.rangeManager.clear();
        } else {
          // Clicking a new date while range exists: start fresh
          this.rangeManager.clear();
          this.rangeManager.select(date);
        }
      }
    }

    this.render();
    updateRangeList();
    this.recalculate();
  }

  recalculate() {
    const opts = { monthlyCardEnabled: this.resourceManager.monthlyCardEnabled, remainingCardDays: this.resourceManager.remainingCardDays };

    const agg = {};
    for (const rule of RULES) {
      agg[rule.id] = { stellarJade: 0, specialPass: 0, regularPass: 0, name: rule.name, color: rule.color };
    }
    agg._total = { stellarJade: 0, specialPass: 0, regularPass: 0 };

    const selected = this.rangeManager.getEndDate();
    if (selected) {
      const startDate = this.rangeManager.getStartDate();
      const res = calculateRange(startDate, selected, opts);
      for (const rule of RULES) {
        agg[rule.id].stellarJade += res[rule.id].stellarJade;
        agg[rule.id].specialPass += res[rule.id].specialPass;
        agg[rule.id].regularPass += res[rule.id].regularPass;
      }
      agg._total.stellarJade += res._total.stellarJade;
      agg._total.specialPass += res._total.specialPass;
      agg._total.regularPass += res._total.regularPass;

      // Add story event rewards
      const storyTotal = getStoryRewardTotal();
      if (storyTotal.stellarJade > 0 || storyTotal.specialPass > 0) {
        agg.storyReward = {
          stellarJade: storyTotal.stellarJade,
          specialPass: storyTotal.specialPass,
          regularPass: 0,
          name: '剧情活动奖励',
          color: '#e09040'
        };
        agg._total.stellarJade += storyTotal.stellarJade;
        agg._total.specialPass += storyTotal.specialPass;
      } else {
        delete agg.storyReward;
      }
    } else {
      // Clear story rewards when no range selected
      document.getElementById('storyRewardPanel').style.display = 'none';
    }

    updateResults(agg, this.resourceManager.holdings);
  }
}

/* ============================================================
   Tooltip
   ============================================================ */
const tooltipEl = document.getElementById('eventTooltip');

function showTooltip(event, date, events) {
  // Skip tooltip on touch devices (mobile)
  if (window.matchMedia('(pointer: coarse)').matches) return;
  const opts = { monthlyCardEnabled: resourceManager.monthlyCardEnabled, remainingCardDays: resourceManager.remainingCardDays };
  const dateStr = `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
  let html = `<div class="tt-date">📅 ${dateStr}</div>`;
  for (const ev of events) {
    const reward = ev.getReward(date, opts);
    const parts = [];
    if (reward.stellarJade) parts.push(`🌟 ${reward.stellarJade}星琼`);
    if (reward.specialPass) parts.push(`🎫 ${reward.specialPass}专票`);
    if (reward.regularPass) parts.push(`🎟 ${reward.regularPass}通票`);
    html += `<div class="tt-item"><span class="tt-name">${ev.name}</span><span class="tt-value">${parts.join(' + ')}</span></div>`;
  }
  tooltipEl.innerHTML = html;
  tooltipEl.classList.add('visible');
  moveTooltip(event);
}

function moveTooltip(event) {
  const x = event.clientX + 16;
  const y = event.clientY + 16;
  const rect = tooltipEl.getBoundingClientRect();
  const maxX = window.innerWidth - rect.width - 10;
  const maxY = window.innerHeight - rect.height - 10;
  tooltipEl.style.left = Math.min(x, maxX) + 'px';
  tooltipEl.style.top = Math.min(y, maxY) + 'px';
}

function hideTooltip() {
  tooltipEl.classList.remove('visible');
}

/* ============================================================
   Story Event Rewards
   ============================================================ */
// State: { versionLabel: { checked: bool } }
let storyRewardState = {};

function getVersionStartDate(ver) {
  // Walk from anchor version (v4.4 = 2026-07-15) to target version
  const anchor = new Date(2026, 6, 15);
  let testVer = getVersion(anchor);
  let testDate = new Date(anchor);
  const targetLabel = getVersionLabel(ver);

  // Walk forward
  while (getVersionLabel(testVer) !== targetLabel && testDate.getFullYear() < 2035) {
    testDate = addDays(testDate, VERSION_DAYS);
    testVer = getVersion(testDate);
  }
  if (getVersionLabel(testVer) === targetLabel) return testDate;

  // Walk backward
  testDate = new Date(anchor);
  while (getVersionLabel(testVer) !== targetLabel && testDate.getFullYear() > 2020) {
    testDate = addDays(testDate, -VERSION_DAYS);
    testVer = getVersion(testDate);
  }
  return testDate;
}

function findVersionsInRange(start, end) {
  const versions = [];
  const seen = new Set();
  // Start from the first version's start date
  const firstVer = getVersion(start);
  if (!firstVer) return versions;
  let curStart = getVersionStartDate(firstVer);
  let curLabel = getVersionLabel(firstVer);
  while (curStart <= end) {
    if (!seen.has(curLabel)) {
      seen.add(curLabel);
      const curVer = getVersion(curStart);
      if (curVer) {
        versions.push({ label: curLabel, ver: curVer, startDate: new Date(curStart) });
      }
    }
    curStart = addDays(curStart, VERSION_DAYS);
    curLabel = getVersionLabel(getVersion(curStart));
  }
  return versions;
}

function updateStoryRewards(start, end) {
  const panel = document.getElementById('storyRewardPanel');
  const list = document.getElementById('storyRewardList');

  if (!start || !end) {
    panel.style.display = 'none';
    return;
  }

  const versions = findVersionsInRange(start, end);
  if (versions.length === 0) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';

  // Initialize new versions
  for (const v of versions) {
    if (!(v.label in storyRewardState)) {
      // Checked if version starts on or after calculation start
      // Auto-check if version hasn't started yet (future version),
      // otherwise check if version starts after calculation start
      const todayDate = startOfDay(new Date());
      const isFutureVersion = v.startDate > todayDate;
      storyRewardState[v.label] = { checked: isFutureVersion || v.startDate > start, startDate: v.startDate };
    }
  }

  // Remove stale versions
  const currentLabels = new Set(versions.map(v => v.label));
  for (const key of Object.keys(storyRewardState)) {
    if (!currentLabels.has(key)) delete storyRewardState[key];
  }

  // Render
  list.innerHTML = '';
  for (const v of versions) {
    const state = storyRewardState[v.label];
    const item = document.createElement('div');
    item.className = 'toggle-row';
    const startStr = `${v.startDate.getMonth()+1}/${v.startDate.getDate()}`;
    item.innerHTML = `
      <label style="font-size:0.82rem;">📖 ${v.label}（${startStr}起）<span style="display:block;font-size:0.7rem;color:var(--text-dim);margin-top:2px;">+4000星琼 +10专票</span></label>
      <div class="toggle-switch ${state.checked ? 'active' : ''}" data-version="${v.label}"></div>
    `;
    item.querySelector('.toggle-switch').addEventListener('click', function() {
      this.classList.toggle('active');
      storyRewardState[this.dataset.version].checked = this.classList.contains('active');
      calendar.recalculate();
    });
    list.appendChild(item);
  }
}

function getStoryRewardTotal() {
  let jade = 0, special = 0;
  for (const key of Object.keys(storyRewardState)) {
    if (storyRewardState[key].checked) {
      jade += 4000;
      special += 10;
    }
  }
  return { stellarJade: jade, specialPass: special };
}

function updateResults(agg, holdings) {
  const total = agg._total;
  const totalJade = holdings.stellarJade + total.stellarJade;
  const totalSpecial = holdings.specialPass + total.specialPass;
  const totalRegular = holdings.regularPass + total.regularPass;

  document.getElementById('totalJade').textContent = totalJade.toLocaleString();
  document.getElementById('totalSpecial').textContent = totalSpecial.toLocaleString();
  document.getElementById('totalRegular').textContent = totalRegular.toLocaleString();
  document.getElementById('holdJade').textContent = holdings.stellarJade.toLocaleString();
  document.getElementById('holdSpecial').textContent = holdings.specialPass.toLocaleString();
  document.getElementById('holdRegular').textContent = holdings.regularPass.toLocaleString();
  document.getElementById('gainJade').textContent = total.stellarJade.toLocaleString();
  document.getElementById('gainSpecial').textContent = total.specialPass.toLocaleString();
  document.getElementById('gainRegular').textContent = total.regularPass.toLocaleString();

  // 抽数合计 = 星琼÷160（取整）+ 专票
  const pullsFromJade = Math.floor(totalJade / 160);
  const remainderJade = totalJade % 160;
  const totalPulls = pullsFromJade + totalSpecial;
  document.getElementById('totalPulls').textContent = totalPulls.toLocaleString();
  document.getElementById('remainderJade').textContent = remainderJade.toLocaleString();

  // Breakdown table
  const tbody = document.getElementById('breakdownBody');
  tbody.innerHTML = '';
  let hasAny = false;
  for (const rule of RULES) {
    const d = agg[rule.id];
    if (d.stellarJade === 0 && d.specialPass === 0 && d.regularPass === 0) continue;
    hasAny = true;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="bd-name"><span class="bd-color" style="background:${d.color}"></span>${d.name}</span></td>
      <td class="bd-value">${d.stellarJade > 0 ? d.stellarJade.toLocaleString() : '-'}</td>
      <td class="bd-value">${d.specialPass > 0 ? d.specialPass.toLocaleString() : '-'}</td>
      <td class="bd-value">${d.regularPass > 0 ? d.regularPass.toLocaleString() : '-'}</td>
    `;
    tbody.appendChild(tr);
  }

  // Story reward row
  if (agg.storyReward) {
    const d = agg.storyReward;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="bd-name"><span class="bd-color" style="background:${d.color}"></span>${d.name}</span></td>
      <td class="bd-value">${d.stellarJade > 0 ? d.stellarJade.toLocaleString() : '-'}</td>
      <td class="bd-value">${d.specialPass > 0 ? d.specialPass.toLocaleString() : '-'}</td>
      <td class="bd-value">-</td>
    `;
    tbody.appendChild(tr);
  }
  if (!hasAny) {
    tbody.innerHTML = '<tr><td class="bd-empty" colspan="4">请选择未来日期区间开始计算</td></tr>';
  }
}

function updateGoalResult(targetJade, result, currentTotal) {
  const el = document.getElementById('goalResult');
  if (!result.reached) {
    el.innerHTML = `❌ 两年内无法攒够 <strong>${targetJade.toLocaleString()}</strong> 星琼（当前持有 ${currentTotal.toLocaleString()}，还需 ${(targetJade - currentTotal).toLocaleString()}，最多再获取 ${result.totalJade.toLocaleString()}）`;
    el.classList.add('visible');
    return;
  }
  const dateStr = `${result.date.getFullYear()}年${result.date.getMonth()+1}月${result.date.getDate()}日`;
  // Count story rewards included in the result
  let storyJade = 0, storySpecial = 0;
  for (const key of Object.keys(storyRewardState)) {
    if (storyRewardState[key].checked) {
      storyJade += 4000;
      storySpecial += 10;
    }
  }
  const hasStory = storyJade > 0 || storySpecial > 0;
  el.innerHTML = `
    ✅ 目标 <span class="gr-value">${targetJade.toLocaleString()}</span> 星琼 &nbsp;|&nbsp; 当前持有 <span class="gr-value">${currentTotal.toLocaleString()}</span> 星琼
    <br>还需攒 <span class="gr-value">${(targetJade - currentTotal).toLocaleString()}</span> 星琼，预计 <span class="gr-value">${result.daysNeeded}</span> 天
    <br>预计达成日期：<span class="gr-date">${dateStr}</span>
    <br><span style="font-size:0.75rem;color:var(--text-dim);">（期间获取专票 ${result.specialPassTotal} 张 = ${(result.specialPassTotal * 160).toLocaleString()} 星琼${hasStory ? `，剧情奖励 ${storyJade.toLocaleString()} 星琼 + ${storySpecial} 专票` : ''}）</span>
  `;
  el.classList.add('visible');
}

function renderAccountTabs() {
  const container = document.getElementById("accountTabList");
  if (!container) return;
  let html = "";
  accountManager.accounts.forEach((acc, i) => {
    var isActive = acc.id === accountManager.activeId;
    var bg = isActive ? "background:var(--gold);color:#fff;" : "background:rgba(255,255,255,0.05);color:var(--text-secondary);";
    html += '<div class="account-tab" data-id="' + acc.id + '" style="cursor:pointer;padding:4px 12px;border-radius:6px;font-size:0.8rem;font-weight:500;white-space:nowrap;transition:all 0.2s;' + bg + '" data-active="' + isActive + '">' + acc.name + '</div>';
  });
  container.innerHTML = html;
  // Click handlers
  container.querySelectorAll(".account-tab").forEach(tab => {
    tab.addEventListener("click", function() {
      var id = this.dataset.id;
      if (id === accountManager.activeId) return;
      accountManager.switchAccount(id);
      refreshAccountUI();
      calendar.render();
      updateRangeList();
      calendar.recalculate();
      renderAccountTabs(); // update active tab style
    });
    tab.addEventListener("dblclick", function() {
      var id = this.dataset.id;
      var acc = accountManager.accounts.find(function(a) { return a.id === id; });
      if (!acc) return;
      var name = prompt("修改账号名称:", acc.name);
      if (name && name.trim()) {
        acc.name = name.trim();
        accountManager.save();
        renderAccountTabs();
      }
    });
    tab.addEventListener("contextmenu", function(e) {
      e.preventDefault();
      var id = this.dataset.id;
      if (accountManager.accounts.length <= 1) return;
      var acc = accountManager.accounts.find(function(a) { return a.id === id; });
      if (confirm("确定删除账号 \"" + (acc ? acc.name : "") + "\" 吗？")) {
        accountManager.removeAccount(id);
        refreshAccountUI();
        renderAccountTabs();
        calendar.render();
        updateRangeList();
        calendar.recalculate();
      }
    });
  });
}

function refreshAccountUI() {
  document.getElementById("inputJade").value = resourceManager.holdings.stellarJade;
  document.getElementById("inputSpecial").value = resourceManager.holdings.specialPass;
  document.getElementById("inputRegular").value = resourceManager.holdings.regularPass;
  document.getElementById("inputRemainingDays").value = resourceManager.remainingCardDays;
  const toggle = document.getElementById("toggleMonthlyCard");
  if (resourceManager.monthlyCardEnabled) toggle.classList.add("active");
  else toggle.classList.remove("active");
  const remainingCardRow = document.getElementById("remainingCardRow");
  remainingCardRow.style.display = resourceManager.monthlyCardEnabled ? "block" : "none";
}

function init() {
  renderLegend();
  renderAccountTabs();
  refreshAccountUI();

  calendar.render();
  updateRangeList();

  // Auto-select current version's end date
  const todayDate = startOfDay(new Date());
  const currentVer = getVersion(todayDate);
  if (currentVer) {
    const verStart = getVersionStartDate(currentVer);
    const verEnd = addDays(verStart, VERSION_DAYS - 1);
    if (verEnd > todayDate) {
      rangeManager.select(verEnd);
      calendar.render();
      updateRangeList();
    }
  }

  // --- Event Bindings ---

  // Year nav
  document.getElementById('btnAddAccount').addEventListener('click', () => {
    const name = prompt('请输入新账号名称:', '账号 ' + (accountManager.accounts.length + 1));
    if (name && name.trim()) {
      accountManager.addAccount(name.trim());
      accountManager.switchAccount(accountManager.accounts[accountManager.accounts.length - 1].id);
      refreshAccountUI();
      renderAccountTabs();
      // Auto-select current version range for new account
      const todayDate = startOfDay(new Date());
      const currentVer = getVersion(todayDate);
      if (currentVer) {
        const verStart = getVersionStartDate(currentVer);
        const verEnd = addDays(verStart, VERSION_DAYS - 1);
        if (verEnd > todayDate) {
          rangeManager.select(verEnd);
        }
      }
      calendar.render();
      updateRangeList();
      calendar.recalculate();
    }
  });
  document.getElementById('btnPrevYear').addEventListener('click', () => {
    calendar.setYear(calendar.year - 1);
    calendar.recalculate();
  });
  document.getElementById('btnNextYear').addEventListener('click', () => {
    calendar.setYear(calendar.year + 1);
    calendar.recalculate();
  });
  document.getElementById('btnToday').addEventListener('click', () => {
    const now = new Date();
    calendar.setYear(now.getFullYear());
    calendar.recalculate();
    // Scroll current month into view after render
    setTimeout(() => {
      const curMonth = document.querySelector('.month-card.current-month');
      if (curMonth) curMonth.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  });

  // Resource inputs
  document.getElementById('inputJade').addEventListener('input', function() {
    resourceManager.setJade(parseInt(this.value) || 0);
    calendar.recalculate();
  });
  document.getElementById('inputSpecial').addEventListener('input', function() {
    resourceManager.setSpecial(parseInt(this.value) || 0);
    calendar.recalculate();
  });
  document.getElementById('inputRegular').addEventListener('input', function() {
    resourceManager.setRegular(parseInt(this.value) || 0);
    calendar.recalculate();
  });

  // Monthly card toggle
  const toggle = document.getElementById('toggleMonthlyCard');
  const remainingCardRow = document.getElementById('remainingCardRow');
  const remainingDaysInput = document.getElementById('inputRemainingDays');
  toggle.addEventListener('click', function() {
    const active = this.classList.toggle('active');
    resourceManager.setMonthlyCard(active);
    remainingCardRow.style.display = active ? 'block' : 'none';
    calendar.render();
    calendar.recalculate();
  });

  // Remaining days input
  remainingDaysInput.addEventListener('input', function() {
    resourceManager.setRemainingDays(parseInt(this.value) || 0);
    calendar.recalculate();
  });

  // Fixed-today toggle
  document.getElementById('toggleFixedToday').addEventListener('click', function() {
    const active = this.classList.toggle('active');
    rangeManager.setFixedToday(active);
    rangeManager.clear();
    calendar.render();
    updateRangeList();
    calendar.recalculate();
  });

  // Goal calculation
  document.getElementById('btnCalcGoal').addEventListener('click', () => {
    const val = parseInt(document.getElementById('inputGoal').value) || 0;
    const unit = document.getElementById('selectGoalUnit').value;
    if (val <= 0) {
      document.getElementById('goalResult').innerHTML = '⚠️ 请输入大于 0 的目标值';
      document.getElementById('goalResult').classList.add('visible');
      return;
    }
    const targetJade = unit === 'pulls' ? val * 160 : val;
    // Subtract current holdings (星琼 + 专票×160)
    const holdings = resourceManager.holdings;
    const currentTotal = holdings.stellarJade + holdings.specialPass * 160;
    const remaining = Math.max(0, targetJade - currentTotal);

    if (remaining <= 0) {
      document.getElementById('goalResult').innerHTML = `
        ✅ 当前持有（🌟 ${holdings.stellarJade.toLocaleString()} + 🎫 ${holdings.specialPass}张×160）已超过目标 <span class="gr-value">${targetJade.toLocaleString()}</span> 星琼
      `;
      document.getElementById('goalResult').classList.add('visible');
      return;
    }

    const opts = { monthlyCardEnabled: resourceManager.monthlyCardEnabled, remainingCardDays: resourceManager.remainingCardDays };
    const result = calculateGoal(remaining, opts);
    updateGoalResult(targetJade, result, currentTotal);

    // Auto-select calendar range from today to estimated date
    if (result.reached && result.date) {
      calendar.setYear(result.date.getFullYear());
      rangeManager.select(result.date);
      calendar.render();
      updateRangeList();
      calendar.recalculate();
    }
  });

  // Initial calculation
  calendar.recalculate();
}

// Run
init();
</script>
</body>
</html>
